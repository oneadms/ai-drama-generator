[project]
name = "霸总的秘密"
genre = "romance"
episodes = 100
duration_per_episode = 90  # 秒

[script]
provider = "openai"  # openai, claude, qwen
model = "gpt-4"
api_key = "${OPENAI_API_KEY}"
temperature = 0.8
template_path = "templates/romance.txt"

[voice]
provider = "azure"  # azure, elevenlabs, edge
voice_name = "zh-CN-XiaoxiaoNeural"
api_key = "${AZURE_SPEECH_KEY}"
region = "eastasia"

[video]
provider = "sadtalker"  # sadtalker, heygen,剪映
avatar_image = "assets/avatar.png"
resolution = "720p"
fps = 30

[assets]
background_music = "assets/music/"
sound_effects = "assets/sfx/"
background_images = "assets/backgrounds/"

[output]
output_dir = "output/"
format = "mp4"
quality = "high"

[upload]
enabled = false
platform = "hongguo"  # 红果短剧
schedule = "daily"  # daily, batch
episodes_per_day = 2
